<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card p-4 p-md-5 text-center">
        <h1 class="h4 fw-bold mb-1">Number Guessing Game</h1>
        <p class="mb-4">Guess a number between <strong>1</strong> and <strong>10</strong></p>

        <p class="mb-2">
            <span id="attempts-left" class="fs-5 fw-bold">5</span> attempts remaining
        </p>

        <div class="d-flex justify-content-center gap-2 mb-4" id="dots">
            <span class="dot" id="dot-1"></span>
            <span class="dot" id="dot-2"></span>
            <span class="dot" id="dot-3"></span>
            <span class="dot" id="dot-4"></span>
            <span class="dot" id="dot-5"></span>
        </div>

        <div class="d-flex gap-2 mb-3">
            <input type="number" id="guess-input" class="form-control text-center"
                   min="1" max="10" placeholder="Enter 1 – 10" autocomplete="off" />
            <button id="submit-btn" class="btn btn-primary" onclick="submitGuess()">Submit</button>
        </div>

        <div id="history" class="history mb-3"></div>

        <button id="reset-btn" class="btn btn-outline-secondary w-100" onclick="resetGame()">Reset</button>
    </div>

    <script src="random.js"></script>
</body>
</html>
